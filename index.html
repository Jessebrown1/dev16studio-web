<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- FAVICON (BASE) -->
    <link rel="icon" type="image/png" href="/dev16.png" />
    <link rel="apple-touch-icon" href="/dev16.png" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dev16</title>

    <!-- 🚀 ANIMATED FAVICON LOADER (DEV16 PREMIUM) -->
    <script>
      const canvas = document.createElement("canvas");
      canvas.width = 64;
      canvas.height = 64;
      const ctx = canvas.getContext("2d");

      let angle = 0;

      const img = new Image();
      img.src = "/dev16.png";

      function draw() {
        ctx.clearRect(0, 0, 64, 64);

        // background
        ctx.fillStyle = "#0f0a07";
        ctx.beginPath();
        ctx.arc(32, 32, 30, 0, Math.PI * 2);
        ctx.fill();

        // logo (center)
        if (img.complete) {
          ctx.save();
          ctx.beginPath();
          ctx.arc(32, 32, 18, 0, Math.PI * 2);
          ctx.clip();
          ctx.drawImage(img, 18, 18, 28, 28);
          ctx.restore();
        }

        // spinning loader ring
        ctx.strokeStyle = "#C9A24D";
        ctx.lineWidth = 5;
        ctx.beginPath();
        ctx.arc(32, 32, 24, angle, angle + 1.4);
        ctx.stroke();

        angle += 0.06;

        const link =
          document.querySelector("link[rel='icon']") ||
          document.createElement("link");

        link.type = "image/png";
        link.rel = "icon";
        link.href = canvas.toDataURL("image/png");

        if (!document.querySelector("link[rel='icon']")) {
          document.head.appendChild(link);
        }

        requestAnimationFrame(draw);
      }

      draw();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
